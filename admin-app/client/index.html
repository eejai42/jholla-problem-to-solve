<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Causal Autoimmune — Case Intake (admin)</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Effortless Explainer DAG: click any derived cell (data-er-dag="Table.Field")
         to see exactly how it was computed. Generated by rulebook-to-explainer-dag
         into /public/rulebook-explainer-dag on every `effortless build`. -->
    <link rel="stylesheet" href="/rulebook-explainer-dag/dag.css" />
    <script src="/rulebook-explainer-dag/embedded-graph.js"></script>
    <script src="/rulebook-explainer-dag/dag-resolver.js"></script>
    <script src="/rulebook-explainer-dag/routing.js"></script>
    <script src="/rulebook-explainer-dag/explainer-dag.js"></script>
    <script>
      // Init the explainer (modal mode) once the scripts load. The ƒ provenance
      // toggle is mounted separately by the React app into the pinned bottom-left
      // nav slot (#explainer-toggle-mount) once that element exists — see App.jsx.
      window.addEventListener('DOMContentLoaded', function () {
        if (window.EffortlessExplainer) {
          window.EffortlessExplainer.init({ mode: 'modal' });
        }
      });
    </script>
  </body>
</html>
